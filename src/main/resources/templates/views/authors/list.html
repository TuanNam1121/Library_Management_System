<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/common :: head(title='Author Management')}"></head>

<body>

<nav th:replace="~{fragments/common :: navbar}"></nav>

<div class="container mt-5">
    <div class="card-body p-0" style="border-radius:20px">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2>Author Management</h2>

        <a th:href="@{/authors/create}"
           class="btn btn-primary">
            + New Author
        </a>
    </div>
        <div th:if="${error}"
             style="
        background:#dc3545;
        color:white;
        padding:12px 16px;
        border-radius:8px;
        margin-bottom:20px;
        font-weight:600;
     ">
            <span th:text="${error}"></span>
        </div>
        <div th:if="${success}"
             style="
        background:green;
        color:white;
        padding:12px 16px;
        border-radius:8px;
        margin-bottom:20px;
        font-weight:600;
     ">
            <span th:text="${success}"></span>
        </div>

    <table  class="table table-dark table-hover align-middle mb-0">

        <thead>
        <tr class="text-center">
            <th>ID</th>
            <th>Name</th>
            <th>Biography</th>
            <th>Action</th>
        </tr>
        </thead>


        <tbody>
        <form th:each="author : ${authors}" th:object="${author}" th:action="@{/authors/edit}" method="post" style="background: black; color: white">
            <tr>
                <input type="hidden" name="id" th:value="${author.id}">
            <td th:text="${author.id}"></td>
            <td th:text="${author.name}"></td>
            <td th:text="${author.bio}"></td>
            <td>
                <a th:href="@{/authors/view/{id}(id=${author.id})}"
                   class="btn btn-warning btn-sm">
                    View
                </a>

                <a th:href="@{/authors/delete/{id}(id=${author.id})}"
                   class="btn btn-danger btn-sm"
                   onclick="return confirm('Delete this author?')">
                    Delete
                </a>
            </td></tr>
        </form>
        </tbody>

    </table>
</div>
</div>

</body>
</html>
