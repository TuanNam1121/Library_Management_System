<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">

<head
    th:replace="~{fragments/common :: head(title='Chỉnh sửa sách - LibraryHub', description='Chỉnh sửa thông tin sách')}">
</head>

<body>
    <nav th:replace="~{fragments/common :: navbar}"></nav>

    <main class="page-content">
        <div class="container" style="max-width:720px; padding-top:2rem; padding-bottom:3rem;">

            <h1 style="font-size:1.6rem; font-weight:700; margin-bottom:1.5rem;">Chỉnh sửa sách</h1>

            <div th:if="${errorMessage}"
                style="background:rgba(239,68,68,0.1);border:1px solid #ef4444;color:#ef4444;padding:.75rem 1rem;border-radius:8px;margin-bottom:1rem;"
                th:text="${errorMessage}"></div>

            <form th:action="@{/books/{id}/edit(id=${book.id})}" th:object="${form}" method="post"
                enctype="multipart/form-data">

                <div style="margin-bottom:1rem;">
                    <label>Tên sách *</label><br>
                    <input type="text" th:field="*{title}" style="width:100%;padding:.5rem;" required />
                </div>

                <div style="margin-bottom:1rem;">
                    <label>ISBN</label><br>
                    <input type="text" th:field="*{isbn}" style="width:100%;padding:.5rem;" />
                </div>

                <div style="display:grid;grid-template-columns:1fr 1fr;gap:1rem;margin-bottom:1rem;">
                    <div>
                        <label>Tác giả</label><br>
                        <select th:field="*{authorId}" style="width:100%;padding:.5rem;">
                            <option value="0">-- Chọn tác giả --</option>
                            <option th:each="a : ${authors}" th:value="${a.id}" th:text="${a.name}"></option>
                        </select>
                    </div>
                    <div>
                        <label>Thể loại</label><br>
                        <select th:field="*{categoryId}" style="width:100%;padding:.5rem;">
                            <option value="0">-- Chọn thể loại --</option>
                            <option th:each="c : ${categories}" th:value="${c.id}" th:text="${c.name}"></option>
                        </select>
                    </div>
                </div>

                <div style="display:grid;grid-template-columns:1fr 1fr;gap:1rem;margin-bottom:1rem;">
                    <div>
                        <label>Tổng số bản *</label><br>
                        <input type="number" th:field="*{quantity}" min="0" style="width:100%;padding:.5rem;"
                            required />
                    </div>
                    <div>
                        <label>Số bản có thể mượn *</label><br>
                        <input type="number" th:field="*{availableQuantity}" min="0" style="width:100%;padding:.5rem;"
                            required />
                    </div>
                </div>

                <div style="margin-bottom:1rem;">
                    <label>Mô tả</label><br>
                    <textarea th:field="*{description}" rows="4" style="width:100%;padding:.5rem;"></textarea>
                </div>

                <div style="margin-bottom:1.5rem;">
                    <label>Ảnh bìa</label><br>
                    <img th:if="${book.coverImage != null and !#strings.isEmpty(book.coverImage)}"
                        th:src="@{${book.coverImage}}" alt="Ảnh bìa hiện tại"
                        style="height:100px;display:block;margin-bottom:.5rem;border-radius:4px;" /><br>
                    <input type="file" name="coverImageFile" accept="image/*" />
                </div>

                <div style="display:flex;gap:.75rem;">
                    <a th:href="@{/books/{id}(id=${book.id})}"
                        style="padding:.5rem 1.25rem;border:1px solid #ccc;border-radius:6px;text-decoration:none;">Hủy</a>
                    <button type="submit"
                        style="padding:.5rem 1.25rem;background:#6366f1;color:white;border:none;border-radius:6px;cursor:pointer;">Lưu
                        thay đổi</button>
                </div>

            </form>

            <hr style="margin:2rem 0; border-color:rgba(239,68,68,0.3);" />

            <div>
                <p style="font-size:.875rem;color:#9ca3af;margin-bottom:.75rem;">Xóa sách này </p>
                <form th:action="@{/books/{id}/delete(id=${book.id})}" method="post"
                    onsubmit="return confirm('Bạn có chắc muốn xóa sách này?')">
                    <button type="submit"
                        style="padding:.5rem 1.25rem;background:rgba(239,68,68,0.1);color:#ef4444;border:1px solid #ef4444;border-radius:6px;cursor:pointer;">Xóa
                        sách</button>
                </form>
            </div>

        </div>
    </main>

    <footer th:replace="~{fragments/common :: footer}"></footer>
</body>

</html>
