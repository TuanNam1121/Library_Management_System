<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <th:block th:replace="~{fragments/common :: head(title='Thêm Thể loại mới - LibraryHub', description='Form tạo thể loại sách mới')}"></th:block>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
    <link href="/css/library.css" rel="stylesheet">
</head>
<body>

<nav th:replace="~{fragments/common :: navbar}"></nav>

<main class="container mt-5 mb-5" style="min-height: calc(100vh - 220px); display: flex; align-items: center; justify-content: center;">
    <div class="row w-100 d-flex justify-content-center">
        <div class="col-md-7 search-form-wrapper" style="max-width: 650px; padding: 2.5rem; margin: 2rem auto;">
            <h2 class="mb-2 text-center" style="font-weight: 800; color: var(--text-primary); letter-spacing: -0.02em;">➕ THÊM THỂ LOẠI MỚI</h2>
            <p class="text-center mb-5" style="color: var(--text-secondary); font-size: 0.95rem;">Điền thông tin chi tiết để thêm một thể loại sách vào hệ thống</p>

            <div th:if="${error}" class="alert alert-danger alert-dismissible fade show" role="alert">
                <span th:text="${error}"></span>
                <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
            </div>

            <form th:action="@{/categories/create}" th:object="${category}" method="post">
                <div class="mb-4">
                    <label class="form-label fw-bold" style="color: var(--text-secondary); font-size: 0.9rem; text-transform: uppercase; letter-spacing: 0.05em;">Tên Thể Loại <span class="text-danger">*</span></label>
                    <input type="text" class="search-input" id="name" th:field="*{name}" placeholder="Ví dụ: Công nghệ thông tin, Văn học..." required autofocus>
                </div>

                <div class="mb-5">
                    <label class="form-label fw-bold" style="color: var(--text-secondary); font-size: 0.9rem; text-transform: uppercase; letter-spacing: 0.05em;">Mô Tả Chi Tiết</label>
                    <textarea class="search-input" id="description" th:field="*{description}" rows="4" placeholder="Nhập mô tả tổng quan về thể loại sách này..."></textarea>
                </div>

                <div class="d-flex justify-content-end gap-3 mt-4">
                    <a th:href="@{/categories}" class="btn btn-outline py-2 px-4">Hủy bỏ</a>
                    <button type="submit" class="btn btn-primary py-2 px-4">💾 Lưu Thể Loại</button>
                </div>
            </form>
        </div>
    </div>
</main>

<footer th:replace="~{fragments/common :: footer}"></footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM"
        crossorigin="anonymous"></script>
</body>
</html>
