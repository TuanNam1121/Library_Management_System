<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <th:block th:replace="~{fragments/common :: head(title='Add New Category - LibraryHub', description='Form to create a new book category')}"></th:block>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f8f9fa;
            font-family: 'Inter', sans-serif;
        }
        .main-container {
            margin-top: 3rem;
            margin-bottom: 5rem;
            max-width: 600px;
            min-height: 60vh;
        }
        .custom-card {
            border: none;
            box-shadow: 0 0.5rem 1rem rgba(0, 0, 0, 0.05);
            border-radius: 1rem;
            overflow: hidden;
        }
        .custom-card-header {
            background-color: #ffffff;
            border-bottom: 1px solid #edf2f7;
            padding: 1.5rem;
        }
        .form-label {
            font-weight: 600;
            color: #374151;
            font-size: 0.9rem;
        }
        .form-control {
            border-radius: 0.5rem;
            padding: 0.75rem 1rem;
            border-color: #d1d5db;
        }
        .form-control:focus {
            border-color: #6366f1;
            box-shadow: 0 0 0 0.25rem rgba(99, 102, 241, 0.25);
        }
        .btn-submit {
            background-color: #6366f1;
            color: white;
            font-weight: 500;
            padding: 0.75rem 1.5rem;
            border-radius: 0.5rem;
            border: none;
            transition: all 0.2s;
        }
        .btn-submit:hover {
            background-color: #4f46e5;
            color: white;
            transform: translateY(-1px);
        }
        .btn-cancel {
            font-weight: 500;
            padding: 0.75rem 1.5rem;
            border-radius: 0.5rem;
        }
    </style>
</head>
<body>

<nav th:replace="~{fragments/common :: navbar}"></nav>

<main class="container main-container">
    <div class="card custom-card">
        <div class="custom-card-header">
            <h2 class="h4 mb-1 fw-bold text-dark">➕ Add New Category</h2>
            <p class="text-muted mb-0 small">Enter details to add a new book category to the system</p>
        </div>

        <div class="card-body p-4">
            <form th:action="@{/categories/create}" th:object="${category}" method="post">
                <div class="mb-4">
                    <label for="name" class="form-label">Category Name <span class="text-danger">*</span></label>
                    <input type="text" id="name" th:field="*{name}" class="form-control" placeholder="e.g., Information Technology, Literature..." required autofocus />
                </div>

                <div class="mb-4">
                    <label for="description" class="form-label">Description</label>
                    <textarea id="description" th:field="*{description}" class="form-control" rows="4" placeholder="Enter an overview description for this book category..."></textarea>
                </div>

                <div class="d-flex justify-content-end gap-3 mt-5">
                    <a th:href="@{/categories}" class="btn btn-outline-secondary btn-cancel">Cancel</a>
                    <button type="submit" class="btn btn-submit">💾 Save Category</button>
                </div>
            </form>
        </div>
    </div>
</main>

<!-- ===== FOOTER ===== -->
<footer th:replace="~{fragments/common :: footer}"></footer>

<!-- Bootstrap 5 JS Bundle -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
