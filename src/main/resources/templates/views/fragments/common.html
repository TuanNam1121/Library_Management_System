<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <!-- ===== HEAD FRAGMENT ===== -->
    <th:block th:fragment="head(title, description)">
        <meta charset="UTF-8"/>
        <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
        <meta name="description" th:content="${description ?: 'Hệ thống Quản lý Thư viện Trực tuyến'}"/>
        <title th:text="${title ?: 'LibraryHub'}">LibraryHub</title>
        <link rel="preconnect" href="https://fonts.googleapis.com"/>
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
        <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
        <link rel="stylesheet" th:href="@{/css/library.css}"/>
    </th:block>
</head>
<body>

    <!-- ===== NAVBAR FRAGMENT ===== -->
    <nav class="navbar" th:fragment="navbar">
        <div class="container navbar-inner" style="display: flex; justify-content: space-between; align-items: center; padding: 1rem 0;">
            <a class="brand text-decoration-none" th:href="@{/books}" style="font-size: 1.5rem; font-weight: bold;">
                <span class="brand-text">LibraryHub</span>
            </a>
            <div class="nav-links">
                <a class="nav-link me-3 text-decoration-none" th:href="@{/books}">Tìm sách</a>
                <a class="nav-link me-3 text-decoration-none" href="#" th:if="${session.loggedInUser != null}">Lịch sử mượn</a>
            </div>
            <div class="nav-actions">
                <th:block th:if="${session.loggedInUser == null}">
                    <a class="btn btn-outline-primary me-2" th:href="@{/auths/login}">Đăng nhập</a>
                    <a class="btn btn-primary" th:href="@{/auths/register}">Đăng ký</a>
                </th:block>
                <th:block th:if="${session.loggedInUser != null}">
                    <span class="me-3 fw-bold" th:text="'Xin chào, ' + ${session.loggedInUser}"></span>
                    <a class="btn btn-outline-danger" th:href="@{/auths/logout}">Đăng xuất</a>
                </th:block>
            </div>
        </div>
    </nav>

    <!-- ===== FOOTER FRAGMENT ===== -->
    <footer class="footer" th:fragment="footer">
        <div class="container">
            <p>&copy; 2026 LibraryHub — Hệ thống Quản lý Thư viện Trực tuyến</p>
        </div>
    </footer>

</body>
</html>
