<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <!-- ===== HEAD FRAGMENT ===== -->
    <th:block th:fragment="head(title, description)">
        <meta charset="UTF-8"/>
        <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
        <meta name="description" th:content="${description ?: 'Hệ thống Quản lý Thư viện Trực tuyến'}"/>
        <title th:text="${title ?: 'LibraryHub'}">LibraryHub</title>
        <link rel="preconnect" href="https://fonts.googleapis.com"/>
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
        <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
        <link rel="stylesheet" th:href="@{/css/library.css}"/>
    </th:block>
</head>
<body>

    <!-- ===== NAVBAR FRAGMENT ===== -->
    <nav class="navbar" th:fragment="navbar">
        <div class="container navbar-inner">
            <a class="brand" th:href="@{/books}">
                <span class="brand-text">LibraryHub</span>
            </a>

            <!-- Nav links: READER (UC02, UC05) -->
            <div th:if="${session.loggedInUser != null and session.userRole == 'READER'}" class="nav-links">
                <a class="nav-link" th:href="@{/books}">Tìm sách</a>
                <a class="nav-link" th:href="@{/borrows/history}">Lịch sử mượn</a>
                <a class="nav-link" th:href="@{/borrows/overdue}">Sách quá hạn</a>
            </div>

            <!-- Nav links: ADMIN (UC08, UC09) -->
            <div th:if="${session.loggedInUser != null and session.userRole == 'ADMIN'}" class="nav-links">
                <a class="nav-link" th:href="@{/books}">Quản lý Sách</a>
                <a class="nav-link" th:href="@{/categories}">Quản lý Thể loại</a>
                <a class="nav-link" th:href="@{/authors}">Quản lý Tác giả</a>
                <a class="nav-link" th:href="@{/readers}">Quản lý Người dùng</a>
            </div>

            <!-- Nav links: LIBRARIAN (UC06, UC07) -->
            <div th:if="${session.loggedInUser != null and session.userRole == 'LIBRARIAN'}" class="nav-links">
                <a class="nav-link" th:href="@{/borrows/requests}">Duyệt yêu cầu mượn</a>
                <a class="nav-link" th:href="@{/borrows/management}">Quản lý Mượn/Trả</a>
                <a class="nav-link" th:href="@{/librarian/renew}">Quản lý gia hạn sách</a>
            </div>






            <!-- Nav actions -->
            <div class="nav-actions">
                <!-- Chưa đăng nhập -->
                <th:block th:if="${session.loggedInUser == null}">
                    <a class="btn btn-outline" th:href="@{/auths/login}">Đăng nhập</a>
                    <a class="btn btn-primary" th:href="@{/auths/register}">Đăng ký</a>
                </th:block>

                <!-- Đã đăng nhập -->
                <th:block th:if="${session.loggedInUser != null}">
                    <a th:href="@{/profile}" class="nav-link" style="display:flex;align-items:center;gap:0.5rem;">
                        👤 <span th:text="${session.loggedInUser}">User</span>
                    </a>
                    <a class="btn btn-outline" th:href="@{/auths/logout}">Đăng xuất</a>
                </th:block>
            </div>
        </div>
    </nav>

    <!-- ===== FOOTER FRAGMENT ===== -->
    <footer class="footer" th:fragment="footer">
        <div class="container">
            <p>&copy; 2026 LibraryHub — Hệ thống Quản lý Thư viện Trực tuyến</p>
        </div>
    </footer>

</body>
</html>
