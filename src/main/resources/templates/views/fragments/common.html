<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <!-- ===== HEAD FRAGMENT ===== -->
    <th:block th:fragment="head(title, description)">
        <meta charset="UTF-8"/>
        <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
        <meta name="description" th:content="${description ?: 'Hệ thống Quản lý Thư viện Trực tuyến'}"/>
        <title th:text="${title ?: 'LibraryHub'}">LibraryHub</title>
        <link rel="preconnect" href="https://fonts.googleapis.com"/>
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
        <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
        <link rel="stylesheet" th:href="@{/css/library.css}"/>
    </th:block>
</head>
<body>

    <!-- ===== NAVBAR FRAGMENT ===== -->
    <nav class="navbar" th:fragment="navbar">
        <div class="container navbar-inner">
            <a class="brand" th:href="@{/books}">
                <span class="brand-text">LibraryHub</span>
            </a>
            <div th:if="${session.loginUser != null && session.loginUser.role == 'READER'}" class="nav-links">
                <a class="nav-link" th:href="@{/books}">Tìm sách</a>
                <a class="nav-link" th:href="@{/borrows/history}">Lịch sử mượn</a>
            </div>
            <div th:if="${session.loginUser != null && session.loginUser.role == 'ADMIN'}" class="nav-links">
                <a class="nav-link" th:href="@{/categories}">Book Management</a>
                <a class="nav-link" th:href="@{/categories}">Categories Management</a>
                <a class="nav-link" th:href="@{/authors}">Author Management</a>
                <a class="nav-link" th:href="@{/categories}">Statistics</a>
            </div>
            <div th:if="${session.loginUser != null && session.loginUser.role == 'LIBRARIAN'}" class="nav-links">
                <a class="nav-link" th:href="@{/borrows/requests}">Borrow Request</a>
                <a class="nav-link" th:href="@{/borrows/management}">Borrow Management</a>
            </div>
            <div th:if="${session.loginUser != null}" class="nav-actions">
                <a th:text="${session.loginUser.getName()}" class="btn btn-primary" href="#"></a>
            </div>
        </div>
    </nav>

    <!-- ===== FOOTER FRAGMENT ===== -->
    <footer class="footer" th:fragment="footer">
        <div class="container">
            <p>&copy; 2026 LibraryHub — Hệ thống Quản lý Thư viện Trực tuyến</p>
        </div>
    </footer>

</body>
</html>
