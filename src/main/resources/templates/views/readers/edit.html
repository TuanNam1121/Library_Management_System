<!DOCTYPE html>
<html lang="vi"
      xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments/common :: head(title='Update Reader', description='Update Reader')}"></head>

<body>

<nav th:replace="~{fragments/common :: navbar}"></nav>

<main class="section-wrapper">

    <div class="container">

        <div class="card shadow" style="background-color:#252836">

            <div class="card-header bg-dark text-white">
                <h3 class="mb-0">Update Reader</h3>
            </div>

            <div class="card-body" style="background-color:#252836">

                <form th:action="@{/readers/edit}"
                      th:object="${reader}"
                      method="post">

                    <input type="hidden" th:field="*{id}"/>

                    <input type="hidden" th:field="*{password}"/>

                    <input type="hidden" th:field="*{role}"/>

                    <div class="row">

                        <div class="col-md-6 mb-3">
                            <label class="form-label">Username</label>
                            <input class="form-control"
                                   th:field="*{username}"
                                   readonly>
                        </div>

                        <div class="col-md-6 mb-3">
                            <label class="form-label">Email</label>
                            <input class="form-control"
                                   th:field="*{email}">
                        </div>

                        <div class="col-md-6 mb-3">
                            <label class="form-label">Full Name</label>
                            <input class="form-control"
                                   th:field="*{fullName}">
                        </div>

                        <div class="col-md-6 mb-3">
                            <label class="form-label">Phone</label>
                            <input class="form-control"
                                   th:field="*{phone}">
                        </div>

                        <div class="col-md-12 mb-3">
                            <label class="form-label">Address</label>
                            <input class="form-control"
                                   th:field="*{address}">
                        </div>

                        <div class="col-md-6 mb-3">
                            <label class="form-label">Date of Birth</label>
                            <input type="date"
                                   class="form-control"
                                   th:field="*{dob}" readonly>
                        </div>

                        <div class="col-md-6 mb-3">

                            <label class="form-label">Status</label>

                            <select class="form-select"
                                    th:field="*{enabled}">

                                <option th:value="true">
                                    Active
                                </option>

                                <option th:value="false">
                                    Disabled
                                </option>

                            </select>

                        </div>

                    </div>

                    <hr>

                    <button class="btn btn-success">
                        Save
                    </button>

                    <a th:href="@{/readers}"
                       class="btn btn-secondary">
                        Cancel
                    </a>

                </form>

            </div>

        </div>

    </div>

</main>

<footer th:replace="~{fragments/common :: footer}"></footer>

</body>
</html>
