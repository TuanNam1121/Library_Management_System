<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Login</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
    <link href="/css/library.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"
            integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM"
            crossorigin="anonymous"></script>
</head>
<body>
<div th:replace="~{fragments/common :: navbar}"></div>

<div class="container mt-5 mb-5">
    <div class="row d-flex justify-content-center">
        <div class="col-md-5 border rounded-2 shadow-lg p-4">
            <h2 class="m-3 text-center">LMS PLATFORM LOGIN</h2>
            <div class="alert alert-danger p-2" th:if="${loginError}">
                <p class="mb-0" th:text="${loginError}"></p>
            </div>
            <div class="alert alert-success p-2" th:if="${Registersuccess}">
                <p class="mb-0" th:text="${Registersuccess}"></p>
            </div>
            <form th:action="@{/auths/login}" th:object="${loginRequestDto}" method="post">
                <div class="alert alert-danger p-2" th:if="${#fields.hasGlobalErrors()}">
                    <p class="mb-0" th:each="err : ${#fields.globalErrors()}" th:text="${err}"></p>
                </div>

                <div class="mb-3">
                    <label class="form-label fw-bold">Username</label>
                    <input type="text" class="form-control p-2" id="username" th:field="*{username}" placeholder="Enter username" required>
                    <div class="text-danger" th:if="${#fields.hasErrors('username')}" th:errors="*{username}"></div>
                </div>

                <div class="mb-4">
                    <label class="form-label fw-bold">Password</label>
                    <input type="password" class="form-control p-2" id="password" th:field="*{password}" placeholder="Enter password" required>
                    <div class="text-danger" th:if="${#fields.hasErrors('password')}" th:errors="*{password}"></div>
                </div>

                <button type="submit" class="btn btn-info w-100 py-2">Login</button>

                <p class="text-center mt-4">
                    Don't have an account? <a th:href="@{/auths/register}">Register</a>
                </p>
            </form>
        </div>
    </div>
</div>
</body>
</html>
