<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Register</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
    <link href="/css/library.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"
            integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM"
            crossorigin="anonymous"></script>
</head>
<body>
<div class="container mt-5">
    <div class="row d-flex justify-content-center">
        <div class="col-md-5 border rounded-2 shadow-lg p-4" style="height: 800px">
            <h2 class="m-3 text-center">LMS PLATFORM REGISTER</h2>
            <p class="text-danger" th:text="${errorMessage}"></p>
            <form th:action="@{/auths/register}" method="post">
                <div>
                    <label for="username" class="form-label fw-bold">Username</label>
                    <input type = "text" class = "form-control p-2" id ="username" name="username" placeholder="toitoite123">
                </div>
                <div class="mb-3">
                    <label for="fullName" class="form-label fw-bold">Full Name</label>
                    <input type="text" class="form-control p-2" id="fullName" name="fullName" placeholder="Nguyen Van A" required>
                </div>
                <div class="mb-3">
                    <label for="email" class="form-label fw-bold">Email address</label>
                    <input type="email" class="form-control p-2" id="email" name="email" placeholder="name@example.com" required>
                </div>
                <div class="mb-3">
                    <label for="password" class="form-label fw-bold">Password</label>
                    <input type="password" class="form-control p-2" id="password" name="password" placeholder="*******" required>
                </div>
                <div class="mb-3">
                    <label for="phone" class="form-label fw-bold">Phone</label>
                    <input type="text" class="form-control p-2" id="phone" name="phone" placeholder="0123456789" required>
                </div>

                <div class="mb-3">
                    <label for="address" class="form -label fw-bold">Address</label>
                    <input type="text" class="form-control p-2 " id="address" name="address" placeholder="DienBien">
                </div>

                <div class="mb-3">
                    <label for="dob" class="form -label fw-bold">Day of birth</label>
                    <input type="date" class="form-control p-2 " id="dob" name="dob" placeholder="14/07/2005">
                </div>
                <button type="submit" class="btn btn-info w-100 py-2">Register</button>
                <p class="text-center mt-4">Already have an account? <a th:href="@{/auths/login}">Login</a></p>
            </form>
        </div>
    </div>
</div>
</body>
</html>
