<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Register</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
    <link href="/css/library.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"
            integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM"
            crossorigin="anonymous"></script>
</head>
<body>
<div th:replace="~{fragments/common :: navbar}"></div>

<div class="container mt-5">
    <div class="row d-flex justify-content-center">
        <div class="col-md-5 border rounded-2 shadow-lg p-4" style="min-height: 800px">
            <h2 class="m-3 text-center">LMS PLATFORM REGISTER</h2>
            <div class="alert alert-danger p-2" th:if="${registerError}">
                <p class="mb-0" th:text="${registerError}"></p>
            </div>
            <div class="alert alert-danger p-2" th:if="${success}">
                <p class="mb-0" th:text="${sucess}"></p>
            </div>
            <form th:action="@{/auths/register}" th:object="${user}" method="post">
                <div class="alert alert-danger p-2" th:if="${#fields.hasGlobalErrors()}">
                    <p class="mb-0" th:each="err : ${#fields.globalErrors()}" th:text="${err}"></p>
                </div>
                <div class="mb-3">
                    <label for="username" class="form-label fw-bold">Username</label>
                    <input type="text" class="form-control p-2" id="username" th:field="*{username}" placeholder="toitoite123">
                    <div class="text-danger" th:if="${#fields.hasErrors('username')}" th:errors="*{username}"></div>
                </div>
                <div class="mb-3">
                    <label for="fullName" class="form-label fw-bold">Full Name</label>
                    <input type="text" class="form-control p-2" id="fullName" th:field="*{fullName}" placeholder="Nguyen Van A" required>
                    <div class="text-danger" th:if="${#fields.hasErrors('fullName')}" th:errors="*{fullName}"></div>
                </div>
                <div class="mb-3">
                    <label for="email" class="form-label fw-bold">Email address</label>
                    <input type="email" class="form-control p-2" id="email" th:field="*{email}" placeholder="name@example.com" required>
                    <div class="text-danger" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></div>
                </div>
                <div class="mb-3">
                    <label for="password" class="form-label fw-bold">Password</label>
                    <input type="password" class="form-control p-2" id="password" th:field="*{password}"
                           placeholder="*******" autocomplete="new-password" required>
                    <div class="text-danger" th:if="${#fields.hasErrors('password')}" th:errors="*{password}"></div>
                </div>
                <div class="mb-3">
                    <label for="confirmPassword" class="form-label fw-bold">Confirm Password</label>
                    <input type="password" class="form-control p-2" id="confirmPassword"
                           th:field="*{confirmPassword}" placeholder="*******"
                           autocomplete="new-password" required>
                    <div class="text-danger" th:if="${#fields.hasErrors('confirmPassword')}"
                         th:errors="*{confirmPassword}"></div>
                </div>
                <div class="mb-3">
                    <label for="phone" class="form-label fw-bold">Phone</label>
                    <input type="text" class="form-control p-2" id="phone" th:field="*{phone}" placeholder="0123456789" required>
                    <div class="text-danger" th:if="${#fields.hasErrors('phone')}" th:errors="*{phone}"></div>
                </div>

                <div class="mb-3">
                    <label for="address" class="form-label fw-bold">Address</label>
                    <input type="text" class="form-control p-2" id="address" th:field="*{address}" placeholder="DienBien">
                    <div class="text-danger" th:if="${#fields.hasErrors('address')}" th:errors="*{address}"></div>
                </div>

                <div class="mb-3">
                    <label for="dob" class="form-label fw-bold">Day of birth</label>
                    <input type="date" class="form-control p-2" id="dob" th:field="*{dob}" placeholder="14/07/2005">
                    <div class="text-danger" th:if="${#fields.hasErrors('dob')}" th:errors="*{dob}"></div>
                </div>
                <button type="submit" class="btn btn-info w-100 py-2">Register</button>
                <p class="text-center mt-4">Already have an account? <a th:href="@{/auths/login}">Login</a></p>
            </form>
        </div>
    </div>
</div>
</body>
</html>
