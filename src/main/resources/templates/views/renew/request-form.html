<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Gia hạn sách</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css"
          rel="stylesheet"
          integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC"
          crossorigin="anonymous">

    <!-- CSS của project -->
    <link rel="stylesheet" th:href="@{/css/library.css}">
</head>

<body>

<div th:replace="~{fragments/common :: navbar}"></div>

<main class="page-content">
    <section class="section-wrapper">
        <div class="container">

            <div class="detail-breadcrumb">
                <a th:href="@{/borrows/history}">Lịch sử mượn</a>
                <span>/</span>
                <span>Yêu cầu gia hạn</span>
            </div>

            <div class="row justify-content-center">
                <div class="col-lg-7 col-md-9">

                    <div class="profile-content">
                        <div class="p-4 p-md-5">

                            <div class="text-center mb-4">
                                <div style="font-size: 3rem"></div>

                                <h1 class="detail-title mt-2">
                                    Yêu cầu gia hạn sách
                                </h1>

                                <p class="hero-subtitle mb-0">
                                    Chọn ngày trả mới và gửi yêu cầu đến thủ thư
                                </p>
                            </div>


                            <!-- Success nếu cần -->
                            <div class="alert-box alert-success"
                                 th:if="${success}">

                                <span th:text="${success}"></span>
                            </div>

                            <div class="alert-box alert-danger"
                                 th:if="${renewError}">

                                <span th:text="${renewError}"></span>
                            </div>
                            <form class="profile-form"
                                  th:action="@{/renew-requests/create/{id}(id=${borrowDetailId})}"
                                  th:object="${renewRequest}"
                                  method="post">

                                <div class="form-field">
                                    <label for="requestDueDate"
                                           class="form-label">
                                        Ngày trả mới
                                    </label>

                                    <input type="datetime-local"
                                           id="requestDueDate"
                                           class="form-input"
                                           th:field="*{requestDueDate}"
                                           th:classappend="${#fields.hasErrors('requestDueDate')}
                                                ? ' border border-danger'
                                                : ''">

                                    <div class="text-danger small mt-1"
                                         th:if="${#fields.hasErrors('requestDueDate')}"
                                         th:errors="*{requestDueDate}">
                                    </div>

                                    <small style="color: var(--text-muted)">
                                        Thời hạn gia hạn tối đa là 14 ngày kể từ hạn trả hiện tại.
                                    </small>
                                </div>

                                <div class="form-field">
                                    <label for="readerNote"
                                           class="form-label">
                                        Lý do gia hạn
                                    </label>

                                    <textarea id="readerNote"
                                              class="form-input"
                                              rows="5"
                                              th:field="*{readerNote}"
                                              placeholder="Nhập lý do bạn muốn gia hạn..."></textarea>

                                    <small style="color: var(--text-muted)">
                                        Lý do sẽ giúp thủ thư xem xét yêu cầu của bạn.
                                    </small>
                                </div>

                                <div class="detail-status-block mt-2">
                                    <div class="detail-availability">
                                        <div class="availability-indicator indicator-available"></div>

                                        <div>
                                            <div class="availability-text-label">
                                                Trạng thái yêu cầu
                                            </div>

                                            <div class="availability-text-value text-available">
                                                Sẽ được gửi đến thủ thư
                                            </div>
                                        </div>
                                    </div>
                                </div>

                                <div class="d-flex flex-column flex-sm-row gap-3 mt-3">
                                    <a th:href="@{/borrows/history}"
                                       class="btn btn-outline flex-fill justify-content-center">
                                        ← Quay lại
                                    </a>

                                    <button type="submit"
                                            class="btn btn-primary flex-fill justify-content-center">
                                         Gửi yêu cầu
                                    </button>
                                </div>

                            </form>

                        </div>
                    </div>

                </div>
            </div>

        </div>
    </section>
</main>

<footer class="footer">
    <div class="container">
        LibraryHub — Hệ thống quản lý thư viện
    </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM"
        crossorigin="anonymous">
</script>

</body>
</html>
